<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    canvas {
      display: block;
    }
    #title {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 1rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>
  <div id="title">Starry</div>

  <script>
    const canvas = document.getElementById('sky');
    const ctx = canvas.getContext('2d');

    let W, H;
    const stars = [];
    const shootingStars = [];
    const NUM_STARS = 300;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    class Star {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.radius = Math.random() * 1.4 + 0.2;
        this.baseAlpha = Math.random() * 0.6 + 0.3;
        this.alpha = this.baseAlpha;
        this.twinkleSpeed = Math.random() * 0.02 + 0.005;
        this.twinkleOffset = Math.random() * Math.PI * 2;
        const tints = [
          [220, 230, 255],
          [255, 245, 220],
          [255, 255, 255],
          [200, 220, 255]
        ];
        this.color = tints[Math.floor(Math.random() * tints.length)];
      }
      update(t) {
        this.alpha = this.baseAlpha + Math.sin(t * this.twinkleSpeed + this.twinkleOffset) * 0.25;
        this.alpha = Math.max(0.05, Math.min(1, this.alpha));
      }
      draw() {
        const [r, g, b] = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha})`;
        ctx.fill();
      }
    }

    class ShootingStar {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * W * 1.5 - W * 0.25;
        this.y = Math.random() * H * 0.5;
        const angle = (Math.random() * 20 + 20) * Math.PI / 180;
        const speed = Math.random() * 8 + 6;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.length = Math.random() * 80 + 60;
        this.alpha = initial ? 0 : 1;
        this.life = 1.0;
        this.decay = Math.random() * 0.015 + 0.008;
        this.delay = initial ? Math.random() * 300 : 0;
      }
      update() {
        if (this.delay > 0) { this.delay--; return; }
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.alpha = this.life;
        if (this.life <= 0) this.reset();
      }
      draw() {
        if (this.delay > 0 || this.alpha <= 0) return;
        const tailX = this.x - this.vx * (this.length / 12);
        const tailY = this.y - this.vy * (this.length / 12);
        const grad = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
        grad.addColorStop(0, `rgba(255,255,255,0)`);
        grad.addColorStop(1, `rgba(255,255,255,${this.alpha * 0.9})`);
        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(this.x, this.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    function initStars() {
      stars.length = 0;
      for (let i = 0; i < NUM_STARS; i++) stars.push(new Star());
      shootingStars.length = 0;
      for (let i = 0; i < 5; i++) shootingStars.push(new ShootingStar());
    }

    function drawBackground() {
      const grad = ctx.createRadialGradient(W * 0.5, H * 0.3, 0, W * 0.5, H * 0.5, Math.max(W, H));
      grad.addColorStop(0,   '#0a0a1a');
      grad.addColorStop(0.4, '#050510');
      grad.addColorStop(1,   '#000005');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      const neb = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, W * 0.4);
      neb.addColorStop(0,   'rgba(30,20,80,0.15)');
      neb.addColorStop(0.5, 'rgba(10,5,40,0.08)');
      neb.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = neb;
      ctx.fillRect(0, 0, W, H);

      const neb2 = ctx.createRadialGradient(W * 0.7, H * 0.6, 0, W * 0.7, H * 0.6, W * 0.35);
      neb2.addColorStop(0,   'rgba(20,40,80,0.12)');
      neb2.addColorStop(0.5, 'rgba(5,15,40,0.06)');
      neb2.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = neb2;
      ctx.fillRect(0, 0, W, H);
    }

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      drawBackground();
      t++;
      for (const s of stars) { s.update(t); s.draw(); }
      for (const ss of shootingStars) { ss.update(); ss.draw(); }
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    animate();
  </script>
</body>
</html>
